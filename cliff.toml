[changelog]
header = "# Changelog\n"
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% set repo = "https://github.com/" ~ remote.github.owner ~ "/" ~ remote.github.repo %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | strtitle }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]({{ repo }}/commit/{{ commit.id }}))\
{% for link in commit.links %} \
([#{{ link.text }}]({{ link.href }}))\
{% endfor %}
{% endfor %}
{% endfor %}\
{% if version and previous.version %}\
**Full changelog:** [{{ previous.version }}...{{ version }}]({{ repo }}/compare/{{ previous.version }}...{{ version }})
{% endif %}
"""
trim = true
footer = ""

[remote.github]
owner = "djlauk"
repo = "lernatelier-checker"

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^build", group = "Build" },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
]
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/djlauk/lernatelier-checker/issues/$1", text = "$1" },
]
filter_commits = true
tag_pattern = "v[0-9]*"
